        <h1>Skripta pro ústní zkoušku z STII (minulé roky)</h1>
        <p>Otázky a odpovědi strukturované podle reálných požadavků zkoušejících a oficiálních přednášek.</p>

<script>
const topics = [
    {
        author: "michalek",
        title: "M1. Firewall – princip fungování a typy (HW vs. SW)",
        points: [
            "Network Firewall je systém nebo skupina systémů určených k řízení přístupu mezi dvěma sítěmi (důvěryhodnou a nedůvěryhodnou) na základě předem nakonfigurovaných pravidel nebo filtrů. Mohou být realizovány jako hardwarová i softwarová řešení.",
            "Firewall filtruje paket na základě informací obsažených v záhlaví každého jednotlivého paketu: zdrojové IP adresy, cílové IP adresy, typu protokolu (TCP/UDP), zdrojového portu a cílového portu.",
            "Z hlediska bezpečnostního návrhu existují dva logické přístupy: 1) Vše, co není explicitně povoleno, je zakázáno (implicitní deny). 2) Vše, co není explicitně zakázáno, je povoleno.",
            "Historicky se technologie firewallů objevila na konci 80. let s rozvojem internetu. Jedním z milníků byl produkt PIX (Private Internet EXchange) společnosti Cisco vydaný v roce 1997.",
            "Softwarové firewally běží jako aplikace na obecném operačním systému (např. IPTables v Linuxu), zatímco hardwarové firewally jsou specializovaná, dedikovaná síťová zařízení s optimalizovaným výkonem pro propustnost dat."
        ],
        tip: "U zkoušky Michálek klade velký důraz na bezpečnostní logiku 'vše co není povoleno, je zakázáno', která se uplatňuje u drtivé většiny produkčních firewallů."
    },
    {
        author: "michalek",
        title: "M2. Stavový (Stateful) vs. Bezstavový (Stateless) paketový filtr",
        points: [
            "Bezstavový (Stateless) firewall neudržuje žádný zapamatovaný kontext (stav) ve vztahu k paketům, které právě zpracovává. Každý paket posuzuje striktně izolovaně.",
            "Stavový (Stateful) firewall udržuje záznamy o všech aktivních spojeních procházejících skrze něj (tzv. stavová tabulka / state table). Dokáže detekovat, zda je příchozí paket začátkem nového spojení, součástí již existujícího spojení, nebo zda jde o nevalidní paket.",
            "Filtrování stavového firewallu probíhá porovnáváním parametrů paketu vůči validním stavům v tabulce spojení. Mezi ukládané stavové informace patří zdrojová/cílová IP adresa, porty, protokol, TCP příznaky, sekvenční čísla a čísla potvrzení (ACK), případně typy a kódy zpráv ICMP.",
            "Spojení založená na TCP jsou snadno sledovatelná díky explicitnímu navazování spojení pomocí paketu TCP SYN (proces TCP-3Way-Handshake mění stavy z SYN-SENT přes SYN-RECEIVED až do ESTABLISHED).",
            "U provozu založeného na UDP neexistuje žádný nativní mechanismus navazování spojení na transportní vrstvě, stavový firewall zde proto stavy emuluje na základě časových limitů (timeouts) mezi po sobě jdoucími pakety stejné dvojice adres a portů."
        ],
        tip: "Vysvětlete, že stavový firewall je řádově bezpečnější, protože automaticky propouští zpětný provoz pouze pro komunikaci, kterou inicioval vnitřní legitimní klient."
    },
    {
        author: "michalek",
        title: "M3. Architektura Linux Netfilter a IPTables",
        points: [
            "Netfilter je projekt v rámci jádra Linuxu, který poskytuje framework pro filtrování paketů, překlad adres a portů (NAT/NAPT), logování a modifikaci paketů. Obsahuje tzv. Netfilter hooks (háčky) uvnitř kernelu.",
            "IPTables je generický nástroj příkazové řádky určený pro správu tabulek pravidel firewallu v Linuxu. Jeho nástupcem je modernější a flexibilnější systém nftables.",
            "Struktura IPTables se dělí na tabulky (Tables), z nichž nejdůležitější jsou: <span class='formula'>filter</span> (zodpovědná za samotné filtrování), <span class='formula'>nat</span> (zodpovědná za překlad IP adres) a <span class='formula'>mangle</span> (zodpovědná za modifikaci obsahu/hlaviček paketů).",
            "Každá tabulka obsahuje vestavěné řetězce (Chains) definující fázi zpracování paketu: <span class='formula'>PREROUTING</span> (ihned po příchodu paketu na rozhraní), <span class='formula'>INPUT</span> (před předáním paketu lokálnímu procesu), <span class='formula'>FORWARD</span> (pro pakety směrované skrze hosta), <span class='formula'>OUTPUT</span> (ihned po vygenerování paketu lokálním procesem) a <span class='formula'>POSTROUTING</span> (těsně před opuštěním rozhraní).",
            "Základní syntaxe příkazu: <span class='formula'>iptables --table TABLE -A CHAIN rule --jump Target</span>. Příklad pravidla pro zahození ICMP: <span class='formula'>iptables -A INPUT -p icmp -j DROP</span>. Cílem (Target) může být ACCEPT, DROP, REJECT nebo skok do NAT akcí (DNAT/SNAT/MASQUERADE)."
        ],
        tip: "Zapamatujte si tok paketu: pokud paket pouze prochází skrze Linux router, uplatní se řetězec FORWARD, nikoliv INPUT nebo OUTPUT."
    },
    {
        author: "michalek",
        title: "M4. MikroTik RouterOS Firewall a stavové řetězce",
        points: [
            "Firewall ve filtrování paketů na platformě MikroTik se skládá ze tří předdefinovaných řetězců (chains), které nelze smazat: INPUT, FORWARD a OUTPUT. Jejich chování plně odpovídá konceptu Linux Netfilter.",
            "Řetězec <span class='formula'>INPUT</span> zpracovává pakety, které vstupují do routeru a jsou adresovány přímo jedné z IP adres samotného routeru. Procházející tranzitní provoz se v něm nevyhodnocuje.",
            "Řetězec <span class='formula'>FORWARD</span> zpracovává pakety, které routerem pouze procházejí (jsou směrovány z jednoho rozhraní na druhé).",
            "Řetězec <span class='formula'>OUTPUT</span> zpracovává pakety, které na routeru přímo vznikly (byly generovány samotným operačním systémem RouterOS) a odcházejí skrze jedno z rozhraní ven.",
            "Podporované akce (Actions) při shodě paketu s pravidlem: <span class='formula'>accept</span> (přijetí), <span class='formula'>drop</span> (tiché zahození), <span class='formula'>reject</span> (zahození s odesláním ICMP chybové zprávy), <span class='formula'>log</span> (zápis do systémového logu), <span class='formula'>passthrough</span> (přechod na další pravidlo, slouží pro statistiky), <span class='formula'>tarpit</span> (udržování otevřeného TCP spojení odpovídáním SYN/ACK, čímž se vyčerpávají prostředky útočníka) a <span class='formula'>fasttrack-connection</span> (přepnutí do režimu FastPath pro radikální snížení zátěže CPU routeru)."
        ],
        tip: "Všechna pravidla ve firewallu MikroTiku jsou zpracovávána v sekvenčním pořadí (shora dolů). Jakmile paket odpoví pravidlu s akcí accept nebo drop, zpracování v daném řetězci končí."
    },
    {
        author: "michalek",
        title: "M5. Překlad adres: Static NAT, Dynamic NAT a PAT (Overload)",
        points: [
            "NAT (Network Address Translator) umožňuje organizaci prezentovat se navenek v jiném IP prostoru, než jaký reálně používá uvnitř své privátní sítě. Umožňuje zařízením s privátními, globálně nesměrovatelnými adresami komunikovat do internetu jejich překladem na veřejné adresy. Typicky běží na rozhraní stub sítě (Border gateway router).",
            "**Static NAT (One-to-One NAT):** Poskytuje jednoznačný překlad adres v poměru 1:1. Mapování mezi vnitřní privátní adresou a vnější veřejnou adresou je pevně definováno správcem. Používá se tehdy, když vnitřní stanice (např. webový server) musí být zvenčí dostupná na stálé veřejné IP adrese.",
            "**Dynamic NAT:** Mapování vnitřní privátní adresy na veřejnou adresu probíhá dynamicky ze specifikovaného fondu (poolu) veřejných adres. Překlad v tabulce neexistuje, dokud směrovač nezaznamená odchozí provoz vyžadující překlad. Pokud je pool vyčerpán, další stanice se do internetu nepřipojí.",
            "**PAT (Port Address Translation / NAT Overload / Many-to-One):** Umožňuje mapovat mnoho lokálních privátních IP adres na jedinou veřejnou IP adresu (nebo malý pool). K rozlišení jednotlivých datových toků využívá čísla portů vyšších vrstev (TCP/UDP). PAT se pokouší zachovat původní zdrojový port; pokud je obsazen, vyhledá první volný port od hodnoty 1024 výše. V Linuxu se tato činnost označuje jako 'Masquerading'.",
            "Terminologie Cisco: **Inside Local** (IP hosta v privátní síti), **Inside Global** (legitimní veřejná IP reprezentující hosta navenek), **Outside Local** (IP externího cíle, jak se jeví vnitřní síti) a **Outside Global** (skutečná IP přiřazená vlastníkem externímu hostu)."
        ],
        tip: "Výhody NAT zahrnují úsporu veřejného adresního prostoru a skrytí interní topologie (zvýšení bezpečnosti). Nevýhodou je vysoká zátěž procesoru a paměti routeru, latence a ztráta koncové dohledatelnosti paketů (IP traceability)."
    },
    {
        author: "michalek",
        title: "M6. Carrier-Grade NAT (NAT444) a CGN logování",
        points: [
            "Carrier-Grade NAT (CGN), označovaný také jako Large-Scale NAT (LSN) nebo NAT444, je typ masivního překladu adres nasazovaný poskytovateli internetového připojení (ISP) za účelem boje proti vyčerpání veřejných IPv4 adres.",
            "Pojem NAT444 vyjadřuje, že klientský provoz prochází třemi odlišnými IP doménami: zákaznickou privátní sítí (např. doma za routerem dle RFC 1918), privátní sítí operátora (Carrier network) a finálně veřejným internetem.",
            "Dle standardu **RFC 6598** je pro účely vnitřních sítí operátora (mezi zákaznickým routerem CE a CGN routerem poskytovatele) vyhrazen specifický sdílený adresní prostor **<span class='formula'>100.64.0.0/10</span>**.",
            "**Logování a zpětná dohledatelnost:** Standardní PAT generuje enormní množství logů, protože musí zaznamenat každou otevřenou relaci, což je pro ISP neudržitelné. Řešením je **RFC 7422 – Deterministic Address Mapping**, neboli deterministický NAT.",
            "Princip deterministického NATu spočívá v pevném, matematicky definovaném přiřazení bloku vnějších portů pro každou interní IP adresu (např. uživatel s IP 100.64.1.1 dostane fixně porty 2000–2099 na veřejné IP 2.2.2.2). To radikálně snižuje nároky na logování, přičemž je plně zachována zákonná traceability pro abuse zprávy a retention data dle směrnic Evropského parlamentu (např. 2006/24/EC)."
        ],
        tip: "U zkoušky nezapomeňte uvést přesný rozsah pro CGN: 100.64.0.0/10. Často se plete s klasickými privátními rozsahy."
    },
    {
        author: "michalek",
        title: "M7. Přechodové mechanismy na IPv6: Tunelování 6to4 a NAT64/DNS64",
        points: [
            "Při vyčerpání IPv4 adres existují tři hlavní strategie přechodu na IPv6: Dual Stack (souběžný běh obou protokolů), Tunelování (přenos jednoho protokolu v druhém) a Překlad (NAT).",
            "**Mechanismus 6to4 (RFC 3056, RFC 3068):** Umožňuje přenášet IPv6 pakety izolovaných ostrovů skrze stávající nativní IPv4 infrastrukturu (např. internet). Funguje tak, že hraniční Dual-Stack router zapouzdří celý IPv6 paket do datové části IPv4 paketu, přičemž v hlavičce IPv4 nastaví typ protokolu na hodnotu 41 (IPv6-in-IPv4).",
            "Pro mechanismus 6to4 je striktně rezervován IPv6 prefix **<span class='formula'>2002::/16</span>**. Za tento prefix se do hlavičky IPv6 adresy vkládá 32bitová veřejná IPv4 adresa daného hraničního routeru převedená do hexadecimální soustavy (např. IPv4 147.229.192.167 vytvoří prefix 2002:93e5:c0a7::/48).",
            "**NAT64:** Je stavový nebo bezstavový překladač, který umožňuje čistě IPv6 klientům transparentně komunikovat s čistě IPv4 servery. Vytváří mapování mezi IPv6 a IPv4 adresami, přičemž pro tuto službu je rezervován standardní prefix **<span class='formula'>64:ff9b::/96</span>**.",
            "**DNS64:** Úzce spolupracuje s NAT64. Pokud IPv6-only klient vznese dotaz na jméno serveru, který má pouze IPv4 adresu, DNS64 server zachytí prázdnou odpověď (neexistující AAAA záznam), provede dotaz na IPv4 'A' záznam a syntetizuje (vytvoří) falešný 'AAAA' záznam tak, že vezme nalezenou 32bitovou IPv4 adresu a vloží ji na konec prefixu 64:ff9b::/96. Klient pak posílá IPv6 pakety na tuto syntetizovanou adresu a NAT64 brána je po cestě přeloží na standardní IPv4."
        ],
        tip: "Pochopení interakce mezi DNS64 a NAT64 je klíčové: DNS64 upravuje kontrolní rovinu (překlad jmen), zatímco NAT64 realizuje samotný datový překlad hlaviček paketů."
    },
    {
        author: "machnik",
        title: "P1. Směrování (Routing) a proces zpracování paketu směrovačem",
        points: [
            "Směrování (Routing) je proces, jehož účelem je zjištění, kam poslat datové pakety, jejichž cíl leží vně lokálního segmentu sítě. Směrovače (Routery) jsou síťová zařízení vrstvy L3, která sbírají, ověřují a aktualizují směrovací informace.",
            "Směrovací informace jsou uloženy ve **směrovací tabulce** (Routing Table). Každý záznam obsahuje: cílovou síťovou adresu podsítě, síťovou masku, IP adresu následujícího směrovače na cestě (**Next Hop**) a odchozí fyzické rozhraní. Záznamy mohou být vloženy buď staticky (manuálně správcem) nebo dynamicky pomocí směrovacích protokolů. Směrovač automaticky zná pouze cesty do přímo připojených sítí (Directly Connected) na základě konfigurace svých rozhraní.",
            "**Krok 1 (Odesílatel):** Počítač porovná cílovou IP adresu se svou maskou. Pokud cíl není v lokální podsíti, zapouzdří IP paket do ethernetového rámce, kde jako cílovou MAC adresu nastaví **MAC adresu výchozí brány (Default Gateway)**, kterou zjistí pomocí ARP.",
            "**Krok 2 (Přijetí směrovačem):** Směrovač přijme rámec, zkontroluje integritu pomocí FCS (Frame Check Sequence) a ověří cílovou MAC adresu. Pokud mu rámec náleží, rozbalí jej (odstraní L2 hlavičku a patku) a předá IP paket k analýze.",
            "**Krok 3 (Vyhledávání v tabulce):** Směrovač extrahuje cílovou IP adresu z paketu a sekvenčně ji porovnává se záznamy v tabulce (hledá se shoda s nejdelším prefixem). Pokud shodu nalezne, zjistí odchozí rozhraní a Next Hop. Pokud shodu nenalezne, paket zahodí (případně využije statickou výchozí cestu / default route `0.0.0.0/0`). Těsně před odesláním zapouzdří paket do nové L2 hlavičky, kde cílovou MAC adresu Next Hopu zjistí opět pomocí protokolu ARP."
        ],
        tip: "Při popisu zpracování paketu nezapomeňte zdůraznit, že IP adresy zdroje a cíle zůstávají během cesty skrze směrovače neměnné (pokud se neprovádí NAT), ale MAC adresy vrstvy L2 se na každém směrovači (hopu) kompletně přepíší."
    },
    {
        author: "machnik",
        title: "P2. Klasifikace směrovacích protokolů a administrativní vzdálenost",
        points: [
            "Směrovací protokoly se globálně dělí na dvě základní skupiny podle toho, zda operují uvnitř jedné autonomní správy, nebo mezi nimi. Autonomní systém (AS) reprezentuje skupinu sítí pod jednotnou správou s unifikovanou směrovací strategií.",
            "**IGP (Interior Gateway Protocol):** Provádějí výměnu směrovacích informací výhradně **uvnitř** jednoho autonomního systému . Příklady: RIP, OSPF, EIGRP.",
            "**EGP (Exterior Gateway Protocol):** Provádějí výměnu směrovacích informací **mezi** různými autonomními systémy. Současným celosvětovým standardem je protokol **BGP-4**.",
            "Protokoly IGP se dále interně dělí podle použitého algoritmu na: 1) **Distance Vector** (zkoumají pouze směr a vzdálenost; příklad RIP). 2) **Link-State** (shromažďují kompletní topologické informace a stav linek; příklad OSPF). Podmnožinou je hybridní kód EIGRP.",

function init() {
    const navMichalek = document.getElementById('navMichalek');
    const navMachnik = document.getElementById('navMachnik');
    const area = document.getElementById('content-area');

    topics.forEach((t, i) => {
        let btn = document.createElement('div');
        btn.className = `nav-item ${t.author}`;
        btn.id = `nav-${i}`;
        btn.innerText = t.title;
        btn.onclick = () => scrollToTopic(i);
        
        if(t.author === 'michalek') {
            navMichalek.appendChild(btn);
        } else {
            navMachnik.appendChild(btn);
        }

        let card = document.createElement('div');
        card.className = `study-card ${t.author}`;
        card.id = `topic-${i}`;
        card.innerHTML = `
            <span class="category-label ${t.author}">Okruh: ${t.author.toUpperCase()}</span>
            <h2>${t.title}</h2>
            <ul class="key-points">
                ${t.points.map(p => `<li>${p}</li>`).join('')}
            </ul>
            <div class="expert-tip">
                <strong>💡 Tip ke zkoušení:</strong> ${t.tip}
            </div>
        `;
        area.appendChild(card);
    });

    const mainContent = document.getElementById('main-content');
    mainContent.onscroll = () => {
        let current = "";
        topics.forEach((_, i) => {
            const el = document.getElementById(`topic-${i}`);
            if (el.offsetTop - 100 <= mainContent.scrollTop) {
                current = i;
            }
        });
        
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if (current !== "") {
            document.getElementById(`nav-${current}`).classList.add('active');
        }
    };
}

function scrollToTopic(i) {
    document.getElementById(`topic-${i}`).scrollIntoView({behavior: 'smooth'});
}

init();
</script>
