<script>

const master = [
    {
        id: 1,
        q: "Které vrstvy jsou součástí protokolového modelu TCP/IP? (3 správné odpovědi)",

            "Prezentační vrstva",

        hint: "TCP/IP model slučuje vrstvy OSI modelu do 4 základních vrstev.",
        rationale: "Model TCP/IP se skládá ze čtyř vrstev: vrstvy přístupu k síti (Network Access), síťové/internetové vrstvy (Internet), transportní vrstvy (Transport) a aplikační vrstvy (Application)[cite: 2, 3, 4]."
    },
    {

    },
    {
        id: 3,
        q: "Jak se nazývá pravidlo používané distance vector směrovacími protokoly, podle kterého směrovač neposílá směrovací informaci o určité síti zpět sousednímu směrovači, od kterého se dříve tuto informaci naučil?",
        opts: [
            "Poison reverse",
            "Hold-down timer",

        ans: [3],

        hint: "Zabraňuje vzniku směrovacích smyček prostým nevracením informací tam, odkud přišly.",

    },
    {
        id: 4,

            "OSPF",

        pts: 1.0,
        hint: "Tyto protokoly staví kompletní mapu topologie sítě pomocí LSA nebo LSP zpráv.",

    {

            "Používá se až jako poslední možnost, pokud neexistuje cesta k cíli získaná jiným způsobem",
            "Dynamické protokoly ho nedokáží propagovat",
            "Obvykle se používá pro směrování ven ze sítě LAN do WAN.",

    },
    {
        id: 6,

            "2a0d:c000:abcd:0000:0000:0000:0000:0000 - 2a0d:c000:abcd:ffff:ffff:ffff:ffff:ffff"
        ],
        ans: [0],
        pts: 1.0,
        hint: "Prefix /60 nechává poslední 4 bity ve 4. hextetu pro hostitelskou/podsíťovou část (2^4 = 16 hodnot, tj. 0 až f).",

    },
    {
        id: 7,
        q: "Jaký je správný komprimovaný zápis IPv6 adresy 2a0e:0bc0:e0f0:0000:0000:1000:0abc:bcd0 ?",
        opts: [
            "2a0e:bc0:e0f0:0:0:1000:abc:bcd",
            "2a0e:bc0:e0f0::10:abc:bcd0",
            "2a0e:bc:e0f0::1000:abc:bcd0",
            "2a0e:bc0:e0f0::1000:abc:bcd0",

    },
    {

    },
    {
        id: 9,

    },
    {
        id: 10,
        q: "Doplňte broadcast adresu pro IPv4 síťový prefix 10.0.0.0/22.",
        opts: [
            "10.0.1.255",
            "10.0.255.255",
            "10.0.0.255",
            "10.0.3.255",
            "10.0.2.255"

        ans: [3],

    },
    {

        q: "Doplňte broadcast adresu pro IPv4 síťový prefix 10.0.0.0/23.",

            "10.0.2.255",
            "10.0.0.255",
            "10.0.3.255",

    },
    {
        id: 12,

        ans: [2, 3],

    },
    {
        id: 13,

    g.innerHTML = "";
    data.forEach((_, i) => {
        let d = document.createElement('div');
        d.className = 'nav-item'; d.id = `nav-${i}`;
        d.innerText = i + 1;
        d.onclick = () => document.getElementById(`qcard-${i}`).scrollIntoView({behavior:'smooth'});
        g.appendChild(d);
    });
}

function renderQuiz() {
    const c = document.getElementById('quiz');
    c.innerHTML = "";
    data.forEach((d, i) => {
        let isM = d.ans.length > 1;
        
        // Kontrola, zda otázka obsahuje obrázek
        let imgHtml = d.imageUrl ? `<div style="margin: 15px 0;"><img src="${d.imageUrl}" alt="Obrázek k úloze" style="max-width: 100%; height: auto; border: 1px solid #dadce0; border-radius: 8px;"></div>` : "";

        let card = document.createElement('div');
        card.className = 'q-card'; card.id = `qcard-${i}`;
        card.innerHTML = `
            <div class="q-header">
                <div class="q-id-box">
                    <span class="blue-sq-icon" id="sq-${i}" onclick="toggleSquare(${i})"></span>
                    <span id="num-display-${i}" style="font-weight:bold">${i+1}</span>
                    <span style="color:#666; margin-left:10px">ID ${d.id}</span>
                </div>
                <div style="color:var(--primary); font-weight:bold">${d.pts.toFixed(1)} b</div>
            </div>
            <div style="margin-bottom:15px; line-height:1.4">${d.q}</div>
            ${imgHtml} <div id="opts-${i}" style="margin-top:15px;">
                ${d.opts.map((o,oi) => `<label class="opt-label"><input type="${isM?'checkbox':'radio'}" name="q${i}" value="${oi}"><span>${o}</span></label>`).join('')}
            </div>
            <button class="check-btn" id="btn-${i}" onclick="check(${i})">ODEVZDAT ÚLOHU</button>
            <div id="feedback-${i}" class="points-feedback"></div>
        `;
        c.appendChild(card);
    });
}

function toggleSquare(i) {
    const icon = document.getElementById(`sq-${i}`);
    const navItem = document.getElementById(`nav-${i}`);
    const numDisplay = document.getElementById(`num-display-${i}`);
    icon.classList.toggle('active');
    navItem.classList.toggle('flagged');
    const isAct = icon.classList.contains('active');
    navItem.innerText = isAct ? '?' : i + 1;
    numDisplay.innerText = isAct ? '?' : i + 1;
}

function check(i) {
    const d = data[i], block = document.getElementById(`opts-${i}`);
    const btn = document.getElementById(`btn-${i}`);
    if(btn.disabled) return;

    const sel = Array.from(block.querySelectorAll('input:checked')).map(n => parseInt(n.value));
    
    // Explicitní odevzdání bez výběru vyhodnotíme jako 0 bodů
    btn.disabled = true;
    block.querySelectorAll('input').forEach(inp => inp.disabled = true);

    let correctCount = 0, wrongCount = 0;
    d.ans.forEach(a => { if(sel.includes(a)) correctCount++; });
    sel.forEach(s => { if(!d.ans.includes(s)) wrongCount++; });

    let gain = (correctCount - wrongCount) * (d.pts / d.ans.length);
    if(gain < 0) gain = 0;
    
    curScore += gain; maxPosScore += d.pts; solved++;

    const feed = document.getElementById(`feedback-${i}`);
    feed.style.display = 'block';
    feed.innerHTML = `Získáno ${gain.toFixed(2)} z ${d.pts} b. <div class="hint-box"><strong>Odůvodnění:</strong> ${d.rationale}</div>`;
    feed.style.background = (gain >= d.pts * 0.99) ? '#e6f4ea' : gain > 0 ? '#fff4e5' : '#fce8e6';

    let nav = document.getElementById(`nav-${i}`);
    if(gain >= d.pts * 0.99) nav.classList.add('status-green');
    else if(gain > 0) nav.classList.add('status-orange');
    else nav.classList.add('status-red');

    block.querySelectorAll('.opt-label').forEach((l, oi) => {
        if(d.ans.includes(oi)) l.classList.add('correct');
        else if(sel.includes(oi)) l.classList.add('wrong');
    });

    document.getElementById('prog').innerText = `Zodpovězeno: ${solved} / ${data.length}`;
    document.getElementById('score').innerText = `Body: ${curScore.toFixed(2)} / ${maxPosScore.toFixed(2)}`;
}

function finishAll() {
    if(!confirm("Opravdu chcete odevzdat všechny zbývající úlohy?")) return;
    for(let i=0; i < data.length; i++) {
        const btn = document.getElementById(`btn-${i}`);
        if(!btn.disabled) check(i);
    }
    const finalScore = (curScore / maxPosScore) * 100;
    alert(`Test dokončen!\nSkóre: ${curScore.toFixed(2)} / ${maxPosScore.toFixed(2)} (${finalScore.toFixed(1)}%)`);
    window.scrollTo({top: 0, behavior: 'smooth'});
}
</script>
</body>
</html>
